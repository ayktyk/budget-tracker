      <stop offset="0%" stop-color="#2b3142"/>
      <stop offset="100%" stop-color="#111724"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#3f4659" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#0f1522" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf5df"/>
      <stop offset="30%" stop-color="#f1ddb1"/>
      <stop offset="58%" stop-color="#d6b67a"/>
