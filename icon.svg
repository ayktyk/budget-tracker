<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#0e2018"/>
      <stop offset="55%" stop-color="#060907"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="emerald" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#8BF0BE"/>
      <stop offset="45%" stop-color="#3EC98A"/>
      <stop offset="100%" stop-color="#1C7A54"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D48A"/>
      <stop offset="55%" stop-color="#C9A45C"/>
      <stop offset="100%" stop-color="#7A5A24"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3EC98A" stop-opacity="0"/>
      <stop offset="35%" stop-color="#3EC98A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8BF0BE"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ambient emerald glow -->
  <circle cx="256" cy="280" r="190" fill="#3EC98A" opacity="0.20" filter="url(#glow)"/>

  <!-- gold hairline badge (safe zone) -->
  <rect x="80" y="80" width="352" height="352" rx="72"
        fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.55"/>
  <rect x="88" y="88" width="336" height="336" rx="66"
        fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="0.6"/>

  <!-- ascending bar chart (growth / budget tracking) -->
  <g opacity="0.9">
    <rect x="132" y="310" width="34" height="58"  rx="4" fill="url(#emerald)" opacity="0.55"/>
    <rect x="178" y="280" width="34" height="88"  rx="4" fill="url(#emerald)" opacity="0.7"/>
    <rect x="224" y="242" width="34" height="126" rx="4" fill="url(#emerald)" opacity="0.85"/>
    <rect x="270" y="208" width="34" height="160" rx="4" fill="url(#emerald)"/>
    <rect x="316" y="178" width="34" height="190" rx="4" fill="url(#emerald)"/>
  </g>

  <!-- trendline sweeping up over the bars -->
  <path d="M 132 300 Q 205 280 250 235 T 350 165"
        fill="none" stroke="url(#line)" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- endpoint node -->
  <circle cx="350" cy="165" r="8" fill="#8BF0BE"/>
  <circle cx="350" cy="165" r="16" fill="#3EC98A" opacity="0.35"/>

  <!-- ₺ mark — top left of the composition, gold, luxury anchor -->
  <text x="148" y="195" font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="96" text-anchor="middle"
        fill="url(#gold)">₺</text>

  <!-- tiny word mark -->
  <text x="256" y="410" font-family="'Space Grotesk', Helvetica, sans-serif"
        font-weight="500" font-size="22" letter-spacing="14"
        text-anchor="middle" fill="url(#gold)" opacity="0.8">BÜTÇE</text>
</svg>
