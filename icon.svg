<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#0d1f17"/>
      <stop offset="55%" stop-color="#050807"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="dg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#8BF0BE"/>
      <stop offset="42%" stop-color="#3EC98A"/>
      <stop offset="100%" stop-color="#1E7A52"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6C87A"/>
      <stop offset="100%" stop-color="#8A6B2A"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="inner" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- cathedral black canvas -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- green ambient glow behind glyph -->
  <circle cx="256" cy="246" r="170" fill="#3EC98A" opacity="0.18" filter="url(#soft)"/>

  <!-- hairline concentric rings — premium watch-face feel -->
  <circle cx="256" cy="256" r="206" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.55"/>
  <circle cx="256" cy="256" r="198" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- dollar glyph (main mark) -->
  <text x="256" y="360" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="340" text-anchor="middle" fill="url(#dg)" filter="url(#inner)">$</text>

  <!-- subtle highlight stroke on glyph for dimension -->
  <text x="256" y="360" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="340" text-anchor="middle" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1">$</text>

  <!-- monogram below — gold hairline -->
  <text x="256" y="438" font-family="'Space Grotesk', Helvetica, sans-serif" font-weight="500" font-size="28" letter-spacing="12" text-anchor="middle" fill="url(#gold)" opacity="0.85">AY</text>

  <!-- corner accents — minimal luxury marker -->
  <g stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.45">
    <path d="M56 76 L56 56 L76 56"/>
    <path d="M436 56 L456 56 L456 76"/>
    <path d="M456 436 L456 456 L436 456"/>
    <path d="M76 456 L56 456 L56 436"/>
  </g>
</svg>
