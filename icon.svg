        stroke-linecap: square;
        stroke-linejoin: miter;
      }
      .goldOutline {
        fill: none;
        stroke: url(#goldEdge);
        stroke-width: 12;
        stroke-linecap: square;
        stroke-linejoin: miter;
      }
    </style>
