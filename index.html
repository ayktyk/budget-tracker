/* ══════════════════════════════════════════════════════════
   THEME ENGINE — Beyaz · Obsidian · Gece Mavisi · Şampanya
   ══════════════════════════════════════════════════════════ */

/* ───── BEYAZ (default) — Apple Wallet inspired ───── */
:root,
[data-theme="beyaz"] {
  --bg:       #F2F2F7;
  --surface:  #FFFFFF;
  --surface2: #F9F9FB;
  --surface3: #EFEFF4;

  --border:   rgba(60,60,67,0.08);
  --border2:  rgba(60,60,67,0.14);

  --text:     #1D1D1F;
  --text2:    #6E6E73;
  --text3:    #A1A1A6;

  --green:      #30B875;
  --green2:     #1F9A5E;
  --green-soft: #E6F6EC;
  --green-glow: rgba(48,184,117,0.22);

  --red:       #E0544B;
  --red-soft:  #FDECEA;
  --red-glow:  rgba(224,84,75,0.22);
  --blue:      #0A84FF;
  --orange:    #F2A33C;
  --yellow:    #E8C547;
  --purple:    #7B6FE0;

  --accent:     var(--green);
  --accent2:    var(--green2);
  --accent-soft:var(--green-soft);

  --sh1: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.04);
  --sh2: 0 1px 3px rgba(0,0,0,0.05), 0 4px 14px rgba(0,0,0,0.04);
  --sh3: 0 8px 24px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);

  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body:    'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-num:     'JetBrains Mono', 'Manrope', sans-serif;
}

/* ───── OBSIDIAN — Jet black minimalism ───── */
[data-theme="obsidian"] {
  --bg:       #060608;
  --surface:  #111114;
  --surface2: #16161B;
  --surface3: #1E1E25;

  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.12);

  --text:     #F4F4F6;
  --text2:    #9C9CA6;
  --text3:    #5E5E68;

  --green:      #32D583;
  --green2:     #22B368;
  --green-soft: rgba(50,213,131,0.14);
  --green-glow: rgba(50,213,131,0.35);

  --red:       #F25D55;
  --red-soft:  rgba(242,93,85,0.14);
  --red-glow:  rgba(242,93,85,0.35);

  --accent:     var(--green);
  --accent2:    var(--green2);
  --accent-soft:var(--green-soft);

  --sh1: 0 1px 2px rgba(0,0,0,0.35), 0 0 0 0.5px rgba(255,255,255,0.04);
  --sh2: 0 2px 8px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.04) inset;
  --sh3: 0 14px 40px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35);
}

/* ───── GECE MAVİSİ — Midnight navy + antique gold ───── */
[data-theme="midnight"] {
  --bg:       #0A1324;
  --surface:  #10203A;
  --surface2: #142746;
  --surface3: #1B325A;

  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(200,168,90,0.22);

  --text:     #EDE9D9;
  --text2:    #A7B3CB;
  --text3:    #6B7890;

  --green:      #5BD6A1;
  --green2:     #3AB988;
  --green-soft: rgba(91,214,161,0.14);
  --green-glow: rgba(91,214,161,0.32);

  --red:       #F07A70;
  --red-soft:  rgba(240,122,112,0.14);
  --red-glow:  rgba(240,122,112,0.3);

  --accent:      #C8A85A;
  --accent2:     #E1C07A;
  --accent-soft: rgba(200,168,90,0.16);

  --sh1: 0 1px 2px rgba(0,0,0,0.3);
  --sh2: 0 2px 10px rgba(0,0,0,0.4);
  --sh3: 0 16px 44px rgba(0,0,0,0.55);
}

/* ───── YEŞİL — Forest emerald ───── */
[data-theme="yesil"] {
  --bg:       #F2F7F3;
  --surface:  #FFFFFF;
  --surface2: #EAF3EC;
  --surface3: #D8E9DC;

  --border:   rgba(32,82,48,0.08);
  --border2:  rgba(32,82,48,0.18);

  --text:     #0F3A20;
  --text2:    #4A6B56;
  --text3:    #8AA695;

  --green:      #1F7A3D;
  --green2:     #155C2C;
  --green-soft: rgba(31,122,61,0.14);
  --green-glow: rgba(31,122,61,0.3);

  --red:       #C14A3B;
  --red-soft:  rgba(193,74,59,0.12);
  --red-glow:  rgba(193,74,59,0.28);

  --accent:     #1F7A3D;
  --accent2:    #155C2C;
  --accent-soft:rgba(31,122,61,0.14);

  --sh1: 0 1px 2px rgba(15,58,32,0.05);
  --sh2: 0 2px 8px rgba(15,58,32,0.08), 0 4px 14px rgba(15,58,32,0.05);
  --sh3: 0 10px 28px rgba(15,58,32,0.14);
}

/* ───── KIRMIZI — Bordeaux / deep wine ───── */
[data-theme="kirmizi"] {
  --bg:       #1A0A0D;
  --surface:  #241014;
  --surface2: #2C141A;
  --surface3: #3A1A22;

  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(212,160,115,0.22);

  --text:     #F5E6D3;
  --text2:    #C9A185;
  --text3:    #8C6A58;

  --green:      #6FBF7A;
  --green2:     #4FA05C;
  --green-soft: rgba(111,191,122,0.14);
  --green-glow: rgba(111,191,122,0.3);

  --red:       #E85A52;
  --red-soft:  rgba(232,90,82,0.18);
  --red-glow:  rgba(232,90,82,0.36);

  --accent:      #D4A073;
  --accent2:     #B8834C;
  --accent-soft: rgba(212,160,115,0.16);

  --sh1: 0 1px 2px rgba(0,0,0,0.35);
  --sh2: 0 2px 10px rgba(0,0,0,0.48);
  --sh3: 0 16px 44px rgba(0,0,0,0.6);
}

/* ───── ŞAMPANYA — Warm champagne + bronze ───── */
[data-theme="champagne"] {
  --bg:       #F4ECE0;
  --surface:  #FBF6EE;
  --surface2: #F2E6D3;
  --surface3: #E8D8BE;

  --border:   rgba(61,46,26,0.08);
  --border2:  rgba(184,138,68,0.28);

  --text:     #3D2E1A;
  --text2:    #7A6344;
  --text3:    #A58A65;

  --green:      #6FA86A;
  --green2:     #528A4E;
  --green-soft: rgba(111,168,106,0.16);
  --green-glow: rgba(111,168,106,0.3);

  --red:       #C85A45;
  --red-soft:  rgba(200,90,69,0.14);
  --red-glow:  rgba(200,90,69,0.3);

  --accent:      #B88A44;
  --accent2:     #9E7232;
  --accent-soft: rgba(184,138,68,0.16);

  --sh1: 0 1px 2px rgba(61,46,26,0.06);
  --sh2: 0 2px 8px rgba(61,46,26,0.08), 0 4px 14px rgba(61,46,26,0.05);
  --sh3: 0 10px 28px rgba(61,46,26,0.12);
}

/* Shared tokens */
:root,
[data-theme] {
  --r:  10px;
  --rl: 16px;
  --rx: 22px;

  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body:    'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-num:     'JetBrains Mono', 'Manrope', sans-serif;

  --blue:      #0A84FF;
  --orange:    #F2A33C;
  --yellow:    #E8C547;
  --purple:    #7B6FE0;

  /* Compat aliases (keep old names working) */
  --bg1: var(--surface);
  --bg2: var(--surface2);
  --bg3: var(--surface3);
  --bg4: var(--surface3);
  --gold: var(--accent);
  --gold2: var(--accent2);
  --gold3: var(--accent2);
  --gold-glow: var(--green-glow);
  --border-g: var(--border2);
  --green-color: var(--green);
  --red2: var(--red);
  --grad-gold: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
  --grad-line: linear-gradient(90deg, transparent, var(--border2), transparent);
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  font-size: 15px;
  overflow: hidden;
  font-feature-settings: 'tnum';
  -webkit-font-smoothing: antialiased;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
}
.screens, .nav { position: relative; z-index: 1; }

/* ── Scrollable content area ── */
.screens {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.screen {
  display: none;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: max(env(safe-area-inset-top, 0px), 12px) 0 calc(80px + env(safe-area-inset-bottom, 0px));
  scrollbar-width: none;
}
.screen::-webkit-scrollbar { display: none; }
.screen.on { display: block; }

/* ── Bottom Navigation ── */
.nav {
  display: flex;
  background: rgba(255,255,255,0.82);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--border2);
  padding: 8px 4px calc(18px + env(safe-area-inset-bottom, 0px));
  flex-shrink: 0;
  position: relative;
  z-index: 50;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 6px 4px;
  border-radius: var(--r);
  border: none;
  background: none;
  color: var(--text3);
  font-family: inherit;
  transition: color .15s;
}
.nav-item.on { color: var(--green); }
.nav-item svg { width: 22px; height: 22px; }
.nav-item span {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0;
}
.nav-center {
  flex: 0 0 64px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-fab {
  width: 54px; height: 54px;
  background: var(--grad-gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none;
  box-shadow: 0 6px 18px -4px var(--green-glow), 0 2px 6px rgba(0,0,0,0.08);
  transition: transform .15s;
  margin-top: -14px;
}
.nav-fab:active { transform: scale(.94); }
.nav-fab svg { width: 24px; height: 24px; color: #fff; stroke-width: 2.5; }

/* ── Headers ── */
.screen-header {
  padding: 20px 20px 6px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.page-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.page-sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
  font-weight: 400;
}
.header-action {
  font-size: 13px;
  color: var(--green);
  cursor: pointer;
  padding: 6px 10px;
  font-weight: 500;
  border: none;
  background: var(--green-soft);
  border-radius: var(--r);
  transition: all .15s;
}
.header-action:hover { background: var(--green); color: #fff; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: none;
  border-radius: var(--rl);
  padding: 16px 16px;
  margin: 12px 16px 0;
  box-shadow: var(--sh1);
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── Pulse strip (bugün/hafta/ay) ── */
.dash-pulse {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 14px 16px 0;
}
.pulse-cell {
  background: var(--surface);
  border-radius: var(--r);
  padding: 10px 12px;
  box-shadow: var(--sh1);
}
.pulse-k {
  font-size: 11px;
  color: var(--text2);
  font-weight: 500;
}
.pulse-v {
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-top: 2px;
  letter-spacing: -0.3px;
}

/* ── Metric cards ── */
.metrics-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 14px 16px 0;
}
.metric {
  background: var(--surface);
  border-radius: var(--rl);
  padding: 14px 14px;
  box-shadow: var(--sh1);
}
.metric-label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
  margin-bottom: 6px;
}
.metric-value {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.8px;
  line-height: 1.1;
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}
.metric-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 400;
}
.metric.gold { background: linear-gradient(160deg, #34C98A 0%, #1F9A5E 100%); }
.metric.gold .metric-label { color: rgba(255,255,255,0.82); }
.metric.gold .metric-value { color: #fff; }
.metric.gold .metric-sub { color: rgba(255,255,255,0.75); }
.metric.green .metric-value { color: var(--green); }
.metric.red .metric-value { color: var(--red); }

/* ── Goal bar ── */
.goal-wrap {
  background: var(--surface);
  border-radius: var(--rl);
  padding: 14px 16px;
  box-shadow: var(--sh1);
  margin: 0 16px;
}
.goal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.goal-label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}
.goal-numbers { font-size: 13px; font-family: 'Space Grotesk', sans-serif; font-variant-numeric: tabular-nums; font-weight:600; }
.goal-bar {
  height: 8px;
  background: var(--surface3);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.goal-fill {
  height: 100%;
  border-radius: 999px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
  background: linear-gradient(90deg, var(--green), var(--green2));
}
.goal-ticks { display: flex; justify-content: space-between; margin-top: 8px; }
.goal-tick { font-size: 11px; color: var(--text3); font-weight: 500; }

/* ── Chart ── */
.chart-wrap { position: relative; height: 160px; margin-top: 4px; }

/* ── Month tabs ── */
.month-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 12px 16px 0;
  scrollbar-width: none;
}
.month-scroll::-webkit-scrollbar { display: none; }
.m-chip {
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  cursor: pointer;
  border: 1px solid transparent;
  background: var(--surface3);
  color: var(--text2);
  transition: all .15s;
}
.m-chip.on {
  background: var(--green);
  color: #fff;
  font-weight: 700;
}

/* ── Alert pills ── */
.alerts-wrap { padding: 10px 16px 0; display: flex; flex-direction: column; gap: 8px; }
.alert-pill {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border-radius: var(--rl);
  padding: 12px 14px;
  box-shadow: var(--sh1);
}
.alert-pill.red    { background: var(--red-soft); }
.alert-pill.orange { background: #FFF4E2; }
.alert-pill.yellow { background: #FFFBE2; }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.alert-dot.red { background: var(--red); }
.alert-dot.orange { background: var(--orange); }
.alert-dot.yellow { background: var(--yellow); }
.alert-text { flex: 1; font-size: 13px; color: var(--text); }
.alert-pct {
  font-size: 13px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.alert-pct.red { color: var(--red); }
.alert-pct.orange { color: var(--orange); }

/* ── Quick Entry ── */
.quick-amount-display {
  text-align: center;
  padding: 30px 20px 22px;
  margin: 16px 16px 0;
  background: var(--surface);
  border-radius: var(--rxl);
  box-shadow: var(--sh2);
}
.amount-label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
  margin-bottom: 10px;
}
.amount-input-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
.currency-symbol {
  font-size: 30px;
  color: var(--text2);
  font-weight: 500;
}
#q-amt {
  font-size: 54px;
  font-weight: 700;
  letter-spacing: -2px;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 220px;
  text-align: center;
  caret-color: var(--green);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
#q-amt::placeholder { color: var(--text3); }

.quick-fields {
  padding: 14px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.qfield { display: flex; flex-direction: column; gap: 6px; }
.qfield label { font-size: 12px; color: var(--text2); font-weight: 500; }
.qfield input, .qfield select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rm);
  padding: 13px 14px;
  font-size: 15px;
  color: var(--text);
  outline: none;
  width: 100%;
  transition: all .15s;
  box-shadow: var(--sh1);
}
.qfield input:focus, .qfield select:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-glow);
}
.qfield select { -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%236E6E73' d='M6 8L0 0h12z'/></svg>"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px; }
.qfield input::placeholder { color: var(--text3); }

/* Category grid */
.cat-section { padding: 8px 16px 0; }
.cat-section-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 10px; }
.cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.cat-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 4px;
  border-radius: var(--rm);
  border: 1px solid transparent;
  background: var(--surface);
  cursor: pointer;
  transition: all .15s;
  box-shadow: var(--sh1);
}
.cat-tile.on {
  background: var(--green-soft);
  border-color: var(--green);
}
.cat-tile-icon { font-size: 20px; }
.cat-tile-label {
  font-size: 10px;
  color: var(--text2);
  font-weight: 500;
  text-align: center;
  line-height: 1.2;
}
.cat-tile.on .cat-tile-label { font-weight: 700; color: var(--green2); }

/* Add button */
.add-btn {
  margin: 18px 16px 0;
  width: calc(100% - 32px);
  padding: 16px;
  background: linear-gradient(160deg, var(--green) 0%, var(--green2) 100%);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: var(--rl);
  cursor: pointer;
  transition: transform .1s, box-shadow .15s;
  box-shadow: 0 6px 20px -6px var(--green-glow);
}
.add-btn:active { transform: scale(.985); }

/* Quick havaleler */

.qfield-check { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text2); margin-bottom:12px; cursor:pointer; }

.emoji-row, .color-row { display:flex; flex-wrap:wrap; gap:6px; }
.emoji-pick { width:32px; height:32px; border:1px solid var(--border); border-radius:8px; background:transparent; cursor:pointer; font-size:16px; padding:0; display:inline-flex; align-items:center; justify-content:center; }
.emoji-pick.on { border-color:var(--text); box-shadow:0 0 0 2px var(--border); }
.color-pick { width:28px; height:28px; border:2px solid transparent; border-radius:50%; cursor:pointer; padding:0; }

/* Kategori manager satırları */
.cat-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }

.cat-row-main { display:flex; align-items:center; gap:10px; min-width:0; }

.cat-row-lock { font-size:12px; color:var(--text3); }
.cat-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text3); margin:10px 0 4px; }

/* Abonelik satırları */
.sub-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 0; border-bottom:1px solid var(--border); }
.sub-row:last-of-type { border-bottom:none; }
.sub-row.off { opacity:.55; }
.sub-row.pending { background:rgba(232,168,62,0.08); margin:0 -8px; padding:12px 8px; border-radius:8px; border-bottom-color:transparent; }
.sub-main { display:flex; align-items:center; gap:10px; min-width:0; flex:1; }

.sub-total { font-size:13px; color:var(--text2); text-align:right; padding:10px 0 0; border-top:1px solid var(--border); margin-top:6px; }

/* Bütçe sıfırla aksiyonu */
.budget-actions { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }

/* Status toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all .3s;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
  box-shadow: var(--sh3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Income ── */
.income-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.income-entry:last-child { border-bottom: none; }
.income-icon {
  width: 38px; height: 38px;

  font-size: 16px;
  flex-shrink: 0;
  background: var(--green-soft);
}
.income-info { flex: 1; min-width: 0; }
.income-desc { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.income-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
.income-amt { font-size: 16px; font-weight: 600; color: var(--green2); white-space: nowrap; font-variant-numeric: tabular-nums; }

/* ── Transactions ── */
.tx-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.tx-entry:last-child { border-bottom: none; }
.tx-dot-wrap {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 15px;
  background: var(--surface3);
}
.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
.tx-right { text-align: right; }
.tx-amt { font-size: 15px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.tx-cat-tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-top: 2px; display: inline-block; background: var(--surface3); color: var(--text2); font-weight: 500; }

/* ── Budget bars ── */
.budget-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.budget-item:last-child { border-bottom: none; }
.budget-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.budget-name { font-size: 14px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
.budget-meta { display: flex; align-items: center; gap: 8px; }
.budget-pct { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text2); }
.b-input {
  width: 90px;
  text-align: right;
  font-size: 13px;
  padding: 6px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  color: var(--text);
  outline: none;
  font-variant-numeric: tabular-nums;
}
.b-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
.bbar { height: 6px; background: var(--surface3); border-radius: 999px; overflow: hidden; margin-bottom: 6px; }
.bfill { height: 100%; border-radius: 999px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.bsub { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); font-variant-numeric: tabular-nums; }

/* ── P&L Table ── */
.pnl-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.pnl-row:last-child { border-bottom: none; }
.pnl-month { font-size: 13px; color: var(--text2); font-weight: 500; }
.pnl-right { text-align: right; display: flex; flex-direction: column; gap: 2px; }
.pnl-income { font-size: 12px; color: var(--green2); font-variant-numeric: tabular-nums; }
.pnl-net { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
.pnl-net.pos { color: var(--green2); }
.pnl-net.neg { color: var(--red); }

/* ── Calendar ── */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-h { text-align: center; font-size: 11px; color: var(--text3); padding: 6px 0; font-weight: 500; }
.cal-day { min-height: 56px; border-radius: var(--rs); padding: 4px; display: flex; flex-direction: column; background: var(--surface2); }
.cal-day.today { background: var(--green-soft); }
.cal-dn { font-size: 12px; text-align: center; margin-bottom: 2px; color: var(--text); }
.cal-day.today .cal-dn { font-weight: 700; color: var(--green2); }
.cal-ev { font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; text-align: center; line-height: 1.3; }

/* ── Form inputs ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--text2); font-weight: 500; display: block; margin-bottom: 6px; }
.field input, .field select, .field textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rm);
  padding: 12px 13px;
  font-size: 15px;
  color: var(--text);
  outline: none;
  width: 100%;
  transition: all .15s;
  box-shadow: var(--sh1);
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-glow);
}
.field input::placeholder { color: var(--text3); }
.field textarea { min-height: 90px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; resize: vertical; }

/* ── Action buttons ── */
.action-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--rl);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: transform .1s, background .15s;
  margin-top: 12px;
}
.action-btn.primary {
  background: linear-gradient(160deg, var(--green) 0%, var(--green2) 100%);
  color: #fff;
  box-shadow: 0 6px 20px -6px var(--green-glow);
}
.action-btn.secondary {
  background: var(--surface3);
  color: var(--text);
}
.action-btn.secondary:hover { background: #E4E4E9; }
.action-btn:active { transform: scale(.985); }

/* ── Filters ── */
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 12px 16px 0;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.f-chip {
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  border: none;
  background: var(--surface3);
  color: var(--text2);
  transition: all .15s;
}
.f-chip.on { background: var(--green); color: #fff; font-weight: 600; }

/* ── Divider ── */
.section-gap { height: 8px; }

/* ══════════════════════════════════════════════════════════════
   NEW DASHBOARD — Calendar-first, premium typography
   ══════════════════════════════════════════════════════════════ */
body { font-family: var(--font-body); }

.dash-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 10px;
}

}

}

.bal-v {

}
.bal-goal { margin-top: 16px; }
.bal-goal-bar {

}
.bal-goal-fill {

}

/* Calendar */
.cal-wrap {
  margin: 0 14px 14px;
  padding: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rx);
  box-shadow: var(--sh1);
}
.cal-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.cal-month {

  letter-spacing: -0.01em; color: var(--text);

}
.cal-nav {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border2);

.cal-dow {
  display: grid; grid-template-columns: repeat(7, 1fr);

}
.cal-dow span {
  text-align: center; font-size: 10px;
  color: var(--text3); font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-day {
  aspect-ratio: 1 / 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;

  font-size: 13px; font-weight: 500;

}

.day-row-ic.out { background: var(--red-soft); }
.day-row-body { flex: 1; min-width: 0; }
.day-row-desc {
  font-size: 14px; font-weight: 500; color: var(--text);

}
.day-row-cat { font-size: 11px; color: var(--text2); margin-top: 2px; }
.day-row-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }

}
.day-row-amt.in { color: var(--green); }
.day-row-amt.out { color: var(--red); }
.day-empty {

  color: var(--text3); font-size: 13px;
  background: var(--surface2);
  border: 1px dashed var(--border2);

}

/* Collapsible details */
.dash-more {
  margin: 0 14px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rl);
  overflow: hidden;
}
.dash-more > summary {
  list-style: none; cursor: pointer;
  padding: 14px 16px;
  font-size: 13px; font-weight: 600;
  color: var(--text2);
  display: flex; justify-content: space-between; align-items: center;
}
.dash-more > summary::-webkit-details-marker { display: none; }
.dash-more > summary::after {
  content: "›"; font-size: 20px; color: var(--text3);
  transition: transform 0.15s ease;
}
.dash-more[open] > summary::after { transform: rotate(90deg); }
.dash-more-body { padding: 0 10px 10px; }

/* Theme picker sheet */
.theme-sheet {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.32);
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(6px);
}
.theme-sheet.on { display: flex; }
.theme-sheet-card {
  width: 100%; max-width: 480px;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  padding: 20px 18px 28px;
  box-shadow: var(--sh3);
  animation: sheet-up 0.22s ease;
}
@keyframes sheet-up {
  from { transform: translateY(100%); } to { transform: translateY(0); }
}
.theme-sheet-title {
  font-family: var(--font-display); font-size: 26px; font-weight: 400;
  margin-bottom: 16px; letter-spacing: -0.015em;
  color: var(--text); font-style: italic;
}
.theme-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.theme-opt {
  border: 1px solid var(--border2);
  background: var(--surface2);
  border-radius: var(--rl);
  padding: 12px;
  display: flex; flex-direction: column; align-items: flex-start;
  gap: 10px; cursor: pointer;
  transition: transform 0.12s ease;
}
.theme-opt:active { transform: scale(0.98); }
.theme-opt.on { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.theme-prev {
  width: 100%; aspect-ratio: 16 / 9;
  border-radius: 10px;
  display: block;
  border: 1px solid rgba(0,0,0,0.06);
}
.tp-beyaz    { background: linear-gradient(135deg, #F2F2F7 0%, #FFFFFF 55%, #E6F6EC 100%); }
.tp-obsidian { background: linear-gradient(135deg, #060608 0%, #111114 55%, #32D583 140%); }
.tp-midnight { background: linear-gradient(135deg, #0A1324 0%, #142746 60%, #C8A85A 140%); }
.tp-champagne{ background: linear-gradient(135deg, #F4ECE0 0%, #FBF6EE 55%, #B88A44 140%); }
.tp-yesil    { background: linear-gradient(135deg, #F2F7F3 0%, #D8E9DC 55%, #1F7A3D 140%); }
.tp-kirmizi  { background: linear-gradient(135deg, #1A0A0D 0%, #3A1A22 55%, #D4A073 140%); }
.theme-name {
  font-size: 15px; font-weight: 400; color: var(--text);
  font-family: var(--font-display); letter-spacing: -0.005em;
  font-style: italic;
}

/* Typography polish for existing pages */
.page-title { font-family: var(--font-display); letter-spacing: -0.015em; font-weight: 400; font-style: italic; font-size: 26px; }
.card-title { font-family: var(--font-display); letter-spacing: -0.01em; font-weight: 400; font-style: italic; font-size: 17px; }

/* ── Responsive ── */
@media(max-width:360px) {
  .cat-grid { grid-template-columns: repeat(4,1fr); }
  #q-amt { font-size: 44px; width: 180px; }
  .bal-value { font-size: 34px; }
  .cal-day { font-size: 12px; }
}

/* ===== 2026 redesign overrides ===== */
:root {
  --f-serif: "Instrument Serif", Georgia, serif;
  --f-sans: "Inter Tight", -apple-system, system-ui, sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 20px; --s-6: 24px; --s-7: 32px; --s-8: 40px;
  --r-s: 10px; --r-m: 16px; --r-l: 22px; --r-xl: 28px;
  --shadow-1: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-2: 0 8px 28px rgba(0,0,0,0.10);
}
[data-theme="cream"], :root {
  --bg: #f4efe6; --bg-elev:#fbf7ef; --card:#ffffff; --ink:#1c1c1c; --ink-2:#4a4a48; --ink-3:#8a857d;
  --line: rgba(28,28,28,0.08); --line-2: rgba(28,28,28,0.14); --pos:#5b7553; --pos-soft:#e6ede2;
  --neg:#b8543a; --neg-soft:#f2e1da; --warn:#c4923a; --uyap:#6b5b95; --uyap-soft:#ece8f2; --accent-ring:rgba(91,117,83,0.25);
  color-scheme: light;
}
[data-theme="onyx"] {
  --bg:#0e1117; --bg-elev:#161a22; --card:#1c2029; --ink:#f2ead8; --ink-2:#bcb1a0; --ink-3:#7a7468;
  --line: rgba(242,234,216,0.07); --line-2: rgba(242,234,216,0.14); --pos:#c9a765; --pos-soft:rgba(217,184,119,0.12);
  --neg:#d8876a; --neg-soft:rgba(216,135,106,0.14); --warn:#e0b65c; --uyap:#9a8bc2; --uyap-soft:rgba(154,139,194,0.14);
  --accent-ring: rgba(217,184,119,0.30); --shadow-1:0 1px 2px rgba(0,0,0,0.45), 0 4px 16px rgba(0,0,0,0.25); --shadow-2:0 10px 30px rgba(0,0,0,0.55);
  color-scheme: dark;
}
[data-theme="marble"] {
  --bg:#ecedef; --bg-elev:#f4f5f7; --card:#ffffff; --ink:#141518; --ink-2:#45474b; --ink-3:#878a90;
  --line: rgba(20,21,24,0.07); --line-2: rgba(20,21,24,0.13); --pos:#3d6a4e; --pos-soft:#dde9e0;
  --neg:#a64335; --neg-soft:#ecdad5; --warn:#b78627; --uyap:#5b5485; --uyap-soft:#e2e0ec; --accent-ring:rgba(20,21,24,0.15);
  color-scheme: light;
}
[data-theme="midnight"] {
  --bg:#0d1220; --bg-elev:#151b2d; --card:#1b2236; --ink:#e8ecf5; --ink-2:#aeb4c6; --ink-3:#6f7692;
  --line: rgba(232,236,245,0.07); --line-2: rgba(232,236,245,0.14); --pos:#84b19a; --pos-soft:rgba(132,177,154,0.14);
  --neg:#d37f7a; --neg-soft:rgba(211,127,122,0.14); --warn:#d6b366; --uyap:#a494d6; --uyap-soft:rgba(164,148,214,0.14);
  --accent-ring: rgba(132,177,154,0.28); --shadow-1:0 1px 2px rgba(0,0,0,0.45), 0 4px 16px rgba(0,0,0,0.28); --shadow-2:0 10px 30px rgba(0,0,0,0.55);
  color-scheme: dark;
}
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-sans);
  transition: background 300ms ease, color 300ms ease;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}
body { overflow-x: hidden; overflow-y: hidden; position: relative; }
.app { width:100%; max-width: 520px; background: var(--bg); overflow:hidden; }
.screen { padding-bottom: 116px; }
.screen-shell { padding: 18px 16px 0; display:flex; flex-direction:column; gap:12px; }
.screen-shell > * { min-width:0; max-width:100%; }
.card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-l); padding: 20px; box-shadow: var(--shadow-1); margin:0 !important; }
.card-h { display:flex; justify-content:space-between; align-items:flex-end; gap:12px; margin-bottom:14px; }

.hint, .eyebrow, .saved-at { font: 500 11px/1 var(--f-sans); color: var(--ink-3); letter-spacing:.14em; text-transform:uppercase; }

.menu-dots span { width:4px; height:4px; background:var(--ink); border-radius:999px; display:block; }

.uyap-badge { background:var(--uyap-soft); color:var(--uyap); padding:5px 10px; border-radius:999px; }

.spark-stick > span { position:absolute; inset:auto 0 0; border-radius:inherit; background:var(--neg); }
.spark-col.active .spark-stick > span { background:var(--ink); }
.spark-label { font:500 11px/1 var(--f-mono); color:var(--ink-3); }
.month-scroll, .filter-row, .bank-chip-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; max-width:100%; }
.month-scroll::-webkit-scrollbar, .filter-row::-webkit-scrollbar, .bank-chip-row::-webkit-scrollbar { display:none; }
.chip, .m-chip, .f-chip, .bank-chip, .theme-chip { padding:8px 14px; border-radius:22px; border:1px solid var(--line-2); background:var(--bg-elev); font:500 13px/1 var(--f-sans); color:var(--ink); cursor:pointer; }
.m-chip.on, .f-chip.on, .bank-chip.on { background:var(--ink); color:var(--bg); border-color:var(--ink); }
.theme-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.theme-chip { display:flex; align-items:center; gap:10px; text-align:left; }

.list-row, .income-row, .budget-row, .fixed-row, .upcoming-row, .flow-row { display:flex; gap:12px; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--line); }
.list-row:last-child, .income-row:last-child, .budget-row:last-child, .fixed-row:last-child, .upcoming-row:last-child, .flow-row:last-child { border-bottom:none; }

.row-amt.neg { color:var(--neg); }
.pill { padding:4px 10px; border-radius:999px; background:var(--bg-elev); color:var(--ink-2); font:500 11px/1 var(--f-sans); display:inline-flex; align-items:center; gap:6px; }
.btn, .action-btn, .add-btn, .nav-fab, .menu-dots, .theme-chip { transition:transform .12s ease, background .15s ease, color .15s ease, border-color .15s ease; }
.btn { font:500 14px/1 var(--f-sans); padding:12px 18px; border-radius:var(--r-m); border:1px solid transparent; display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; width:auto; }

.input:focus, .field input:focus, .field select:focus, .field textarea:focus, .qfield input:focus { outline:none; border-color:var(--ink); box-shadow:0 0 0 3px var(--accent-ring); }
.amount-big-wrap { padding:10px 0 6px; }

#q-amt { width: 220px; border:none; background:transparent; font:inherit; color:inherit; text-align:center; font-variant-numeric:tabular-nums; outline:none; }
.numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:18px 0; }

.q-grid-two { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.cat-tile, .income-cat { border:1px solid var(--line); background:var(--card); border-radius:var(--r-m); padding:12px 10px; display:flex; align-items:center; gap:10px; cursor:pointer; box-shadow:none; }

.cat-tile-label, .income-cat-label { font:500 13px/1.2 var(--f-sans); color:var(--ink); text-align:left; }
.fav-strip { display:grid; gap:10px; }

.budget-top, .budget-item { padding:0; border:none; }

.budget-name { gap:10px; font:600 14px/1.2 var(--f-sans); color:var(--ink); }
.b-input { width:92px; background:var(--bg-elev); border:1px solid var(--line-2); border-radius:var(--r-m); padding:10px 12px; color:var(--ink); font:500 13px/1 var(--f-mono); }
.bbar { height:8px; background:var(--bg-elev); border-radius:999px; overflow:hidden; margin:10px 0 8px; }
.bsub, .budget-pct { font-family:var(--f-mono); }
.cal-head-nav { display:flex; align-items:center; gap:8px; min-width:0; }
.cal-month { white-space:nowrap; min-width:0; }
.cal-dow, .cal-grid { width:100%; grid-template-columns:repeat(7,minmax(0,1fr)); }
.cal-grid { display:grid; gap:6px; }

.cal-day.today { border-color:var(--ink); }
.cal-day.sel { background:var(--ink); color:var(--bg); }
.day-list-head { padding-bottom:12px; }
.day-empty { background:var(--bg-elev); border:1px dashed var(--line-2); }
.alerts-wrap { display:flex; flex-direction:column; gap:10px; padding:0; }

.mini-meta { gap:10px; }
.saved-at { margin-top:10px; text-align:right; }
.api-collapsible summary { cursor:pointer; font:500 12px/1 var(--f-sans); color:var(--ink-2); margin-bottom:12px; }
.gk-status { font-size:11px; font-weight:600; padding:2px 8px; border-radius:999px; margin-left:6px; }
.gk-status.off { background:rgba(0,0,0,0.08); color:var(--text3,#9c9ca6); }
.gk-status.ok  { background:rgba(62,201,138,0.18); color:#2f9e6a; }
.gk-test-row { display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap; }
.gk-test-row .btn { flex:0 0 auto; min-width:150px; padding:8px 14px; font-size:12px; }
.gk-test-out { font-size:12px; font-weight:500; flex:1; min-width:0; }
.gk-test-out.ok { color:#2f9e6a; }
.gk-test-out.err { color:#e04848; }
.gk-test-out.warn { color:#c4923a; }
.field-note, .parse-result, .analysis-result { font:500 12px/1.6 var(--f-sans); color:var(--ink-2); margin-top:10px; white-space:pre-wrap; }
.ai-sec { padding:14px 16px; border-radius:var(--r-m); background:var(--bg-elev); border:1px solid var(--line); margin-bottom:10px; }
.ai-sec.neg { background:var(--neg-soft); border-color:transparent; }
.ai-sec.pos { background:var(--pos-soft); border-color:transparent; }
.ai-sec h4 { margin:0 0 8px; font:400 18px/1 var(--f-serif); color:var(--ink); }
.ai-sec p, .ai-sec li { font:400 14px/1.5 var(--f-sans); color:var(--ink-2); }
.data-actions { display:flex; flex-direction:column; gap:10px; }
.upcoming-list, #calendar-flow { margin-top:14px; }
.nav { position:fixed; left:50%; transform:translateX(-50%); bottom:14px; width:min(488px, calc(100% - 28px)); background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow-2); padding:8px; border-radius:999px; display:flex; align-items:center; justify-content:space-between; }

.nav-item.on .nav-glyph { background:var(--bg-elev); }
.nav-item span:last-child { font:500 11px/1 var(--f-sans); }
.nav-center { flex:0 0 72px; display:grid; place-items:center; }
.nav-fab { width:56px; height:56px; border-radius:50%; border:none; background:var(--ink); color:var(--bg); font:400 32px/1 var(--f-serif); }
.seed-banner { position:sticky; top:0; z-index:60; display:flex; gap:12px; align-items:center; justify-content:space-between; margin:12px 16px 0; padding:12px 14px; border-radius:var(--r-m); background:var(--warn); color:#fff; }

.seed-banner-close { border:none; background:rgba(255,255,255,0.18); color:#fff; border-radius:999px; padding:8px 12px; font:500 12px/1 var(--f-sans); }
.toast { bottom:96px; background:var(--ink); color:var(--bg); border:1px solid var(--line-2); }
@supports (height: 100svh) {
  .app { min-height:100svh; height:100svh; }
}
@supports not (height: 100svh) {
  .app { min-height:100vh; height:100vh; }

// ── v2 Migration: eski SEED/demo verisini otomatik yedekleyip temizle ──
function migrateV2() {
  if (localStorage.getItem('ay_migrated_v2') === '1') return;
  try {
    const expRaw = localStorage.getItem('ay_exp');
    const incRaw = localStorage.getItem('ay_inc');
    const budRaw = localStorage.getItem('ay_bud');
    const backup = {
      exportedAt: new Date().toISOString(),
      note: 'Otomatik yedek — v2 sıfırlama öncesi',
      expenses: expRaw ? JSON.parse(expRaw) : [],
      incomes:  incRaw ? JSON.parse(incRaw) : [],
      budgets:  budRaw ? JSON.parse(budRaw) : {},
    };
    // Sadece gerçekten veri varsa yedek dosyası indir
    if ((backup.expenses && backup.expenses.length) || (backup.incomes && backup.incomes.length)) {
      const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'ay_backup_' + new Date().toISOString().slice(0,10) + '.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
  } catch(e) {
    console.warn('migrateV2 backup failed:', e);
  }
  // Eski kayıtları temizle, budget/tema/gemini key korunur
  localStorage.removeItem('ay_exp');
  localStorage.removeItem('ay_inc');
  localStorage.removeItem('ay_seed_migrated');
  localStorage.setItem('ay_migrated_v2', '1');
}

function loadFromStorage() {
  migrateV2();
  try {
    const ue = localStorage.getItem('ay_exp');
    if (ue !== null) S.userExp = JSON.parse(ue);
    S.expenses = [...S.userExp];
  } catch(e) { S.expenses = [...S.userExp]; }
  try {
    const ic = localStorage.getItem('ay_inc');
    if (ic) S.incomes = JSON.parse(ic);
  } catch(e) {}
  // Gelir kategorisi migration: bilinmeyen kategoriler 'diger'e düş
  try {
    const validInc = new Set(ICATS.map(c=>c.id));
    let changed = false;
    S.incomes = S.incomes.map(i => {
      if (!validInc.has(i.cat)) { changed = true; return {...i, cat:'diger'}; }
      return i;
    });
    if (changed) localStorage.setItem('ay_inc', JSON.stringify(S.incomes));
  } catch(e) {}
  try {
    const bu = localStorage.getItem('ay_bud');
    if (bu) S.budgets = {...DEF_BUD, ...JSON.parse(bu)};
  } catch(e) {}
  try {
    const fv = localStorage.getItem('ay_favs');
    if (fv !== null) {
      const parsed = JSON.parse(fv);
      if (Array.isArray(parsed)) S.favs = parsed.map(f => ({...f, id: f.id || genId()}));
    }
  } catch(e) {}
  try {
    const cc = localStorage.getItem('ay_cats_custom');
    if (cc !== null) {
      const parsed = JSON.parse(cc);
      if (Array.isArray(parsed)) S.customCats = parsed.filter(c=>c && c.id && c.label);
    }
  } catch(e) {}
  try {
    const sb = localStorage.getItem('ay_subs');
    if (sb !== null) {
      const parsed = JSON.parse(sb);
      if (Array.isArray(parsed)) S.subs = parsed.map(s => ({...s, id: s.id || genId()}));
    }
  } catch(e) {}
  loadGeminiKey();
  const el = document.getElementById('saved-at');
  if (el) el.textContent = new Date().toLocaleDateString('tr-TR');
  renderChoiceChips('stmt-bank-chips',[
    {value:'İşbank',label:'İşbank'},{value:'VakıfBank',label:'VakıfBank'},{value:'Enpara',label:'Enpara'}
  ], document.getElementById('stmt-bank')?.value || 'İşbank', "pickStmtBank('__VAL__')");
  renderDash();
}

function friendlyGeminiError(e){
  const m=String(e&&e.message||e||'').toLowerCase();
  if(m.includes('api key gerekli')) return 'API key girilmemiş. Alan boş görünüyor.';
  if(m.includes('api_key') || m.includes('api key') || m.includes('invalid') && m.includes('key')) return 'API key geçersiz. Google AI Studio\'dan yeni bir key alın.';
  if(m.includes('401') || m.includes('403') || m.includes('unauthenticated') || m.includes('permission')) return 'API key yetkisiz (401/403). Key\'i kontrol edin.';
  if(m.includes('429') || m.includes('quota') || m.includes('rate')) return 'Kota/oran limiti aşıldı (429). Birkaç dakika bekleyin.';
  if(m.includes('failed to fetch') || m.includes('network')) return 'İnternet bağlantısı yok veya erişim engellendi.';
  if(m.includes('model') && m.includes('not found')) return 'Model bulunamadı. Gemini modeli değişmiş olabilir.';
  return e&&e.message?e.message:'Bilinmeyen hata';
}
function geminiText(data){
  return (data.candidates||[])
    .flatMap(c=>(c.content&&c.content.parts)||[])
    .map(p=>p.text||'')
    .join('')
    .trim();
}
async function callGemini({systemInstruction,userText,responseMimeType='text/plain',responseSchema=null,maxOutputTokens=2048,disableThinking=false}){
  const apiKey=getGeminiKey();
  if(!apiKey) throw new Error('Gemini API key gerekli');
  const body={
    systemInstruction:{parts:[{text:systemInstruction}]},
    contents:[{role:'user',parts:[{text:userText}]}],
    generationConfig:{
      temperature:0.2,
      maxOutputTokens,
      responseMimeType
    }
  };
  if(responseSchema) body.generationConfig.responseSchema=responseSchema;
  // Gemini 2.5 flash thinking modu — küçük prompt'larda tüm token'ı thinking'e yakabiliyor
  if(disableThinking) body.generationConfig.thinkingConfig={thinkingBudget:0};
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-goog-api-key':apiKey
    },
    body:JSON.stringify(body)
  });
  const data=await res.json().catch(()=>({}));
  if(!res.ok){
    const msg=data.error&&data.error.message?data.error.message:`HTTP ${res.status}`;
    throw new Error(msg);
  }
  if(data.promptFeedback&&data.promptFeedback.blockReason){
    throw new Error(`İstek engellendi: ${data.promptFeedback.blockReason}`);
  }
  return data;
}

function normalizeTr(str){
  return String(str||'')
    .toLocaleLowerCase('tr-TR')
    .replace(/ı/g,'i')
    .replace(/İ/g,'i')
    .replace(/ş/g,'s')
    .replace(/Ş/g,'s')
    .replace(/ğ/g,'g')
    .replace(/Ğ/g,'g')
    .replace(/ü/g,'u')
    .replace(/Ü/g,'u')
    .replace(/ö/g,'o')
    .replace(/Ö/g,'o')
    .replace(/ç/g,'c')
    .replace(/Ç/g,'c');
}
function extractIsoDate(line){
  const s=String(line||'');
  let m=s.match(/\b(\d{4})[.\-/](\d{2})[.\-/](\d{2})\b/);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/\b(\d{2})[.\-/](\d{2})[.\-/](\d{4})\b/);
  if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  return '';
}
function parseMoneyToken(token){
  let s=String(token||'').replace(/[₺TLtl\s]/g,'');
  if(!s) return 0;
  if(s.includes(',') && s.includes('.')){
    if(s.lastIndexOf(',') > s.lastIndexOf('.')) s=s.replace(/\./g,'').replace(',', '.');
    else s=s.replace(/,/g,'');
  } else if(s.includes(',')) {
    const parts=s.split(',');
    s=parts.length===2 && parts[1].length<=2 ? parts[0].replace(/\./g,'')+'.'+parts[1] : s.replace(/,/g,'');
  } else {
    s=s.replace(/,/g,'');
  }
  const n=parseFloat(s);
  return Number.isFinite(n)?Math.abs(n):0;
}
function inferCategory(desc){

    ['fatura',['turknet','vodafone','turk telekom','turkcell','enerjisa','igdas','iski','superonline','fatura','tt mobil']],
    ['dijital',['apple','google','spotify','netflix','claude','openai','openrouter','youtube','microsoft 365','amazon prime','namecheap','paddle']],
    ['market',['market','bim','a101','sok','migros','carrefour','macrocenter','gida']],
    ['yemek',['yemek','corba','kahve','starbucks','kahvalti','restoran','cafe','firin','kebap','lahmacun']],
    ['eticaret',['trendyol','hepsiburada','amazon','temu','n11','alisveris','ticaret']],
    ['ulasim',['obilet','ido','tcdd','pamukkale','metro turizm','pegasus','thy','ulasim','taksi','uber','marti']],
    ['saglik',['eczane','hastane','doktor','optik','saglik']],
    ['egitim',['udemy','universite','kurs','egitim']],
    ['eglence',['steam','passo','sinema','tiyatro','eglence']],
    ['giyim',['waikiki','lcw','mudo','fenerium','giyim','boyner','defacto']],
    ['yatirim',['funding','quant','yatirim','borsa','kripto','fon']],
    ['vergi',['vergi','v.d.','vergi dairesi','gib']],
    ['nakit',['nakit','atm cekim','para cekme']]
  ];
  for(const [cat,keys] of rules){
    if(keys.some(k=>s.includes(k))) return cat;
  }
  return 'diger';
}
function parseStatementFallback(text,bank){
  const lines=String(text||'')
    .split(/\r?\n/)
    .map(x=>x.trim())
    .filter(Boolean);
  const skipWords=['iade','refund','geri odeme','iptal','alacak','gelen transfer','gelen havale','gelen eft','yatirilan','odeme alindi','faiz','bakiye','toplam','son odeme','ekstre tarihi','hesap kesim','devir'];
  const rows=[];
  for(const rawLine of lines){
    const line=rawLine.replace(/\s+/g,' ').trim();
    if(line.length<6) continue;
    const normalized=normalizeTr(line);
    if(skipWords.some(w=>normalized.includes(w))) continue;
    const date=extractIsoDate(line);
    if(!date) continue;
    let rest=line
      .replace(/\b\d{4}[.\-/]\d{2}[.\-/]\d{2}\b/,'')
      .replace(/\b\d{2}[.\-/]\d{2}[.\-/]\d{4}\b/,'')
      .trim();
    const amountMatches=[...rest.matchAll(/-?\d[\d.,]*\d|-?\d+/g)].map(m=>m[0]);
    if(!amountMatches.length) continue;
    const amountToken=amountMatches[amountMatches.length-1];
    const amt=parseMoneyToken(amountToken);
    if(!amt) continue;
    rest=rest.replace(amountToken,' ').replace(/\s+/g,' ').trim();
    rest=rest.replace(/^[*\-–—:]+|[*\-–—:]+$/g,'').trim();
    if(!rest) rest=bank+' ekstresi';
    rows.push({
      id:genId(),
      d:date,
      desc:rest,
      amt,
      cat:inferCategory(rest),
      bank
    });
  }
  return rows;
}
function importStatementRows(rows){
  // Ekstre giriş tarihi override: orijinal transaction tarihlerini yoksay,
  // hepsini bugüne kaydet. Takvimde tek kırmızı nokta, bütçe kategorileri korunur.
  const today=new Date().toISOString().slice(0,10);
  let added=0;
  rows.forEach(row=>{
    const clean={
      id:row.id||genId(),
      d:today,  // orijinal row.d yoksayıldı
      desc:(row.desc||'').trim(),
      amt:Math.abs(Number(row.amt)||0),
      cat:getCats().some(c=>c.id===row.cat)?row.cat:'diger',
      bank:(row.bank||'').trim()
    };
    if(!clean.desc||!clean.amt||!clean.bank) return;
    S.userExp.push(clean);
    S.expenses.push(clean);
    added++;
  });
  return added;
}
function renderAnalysisHtml(text){
  const safe=String(text||'').trim();
  if(!safe) return 'Analiz üretilemedi.';
  const sections = safe.split(/\n(?=\d\)\s)/).map(s=>s.trim()).filter(Boolean);
  if(sections.length<2) return `<div class="ai-sec"><h4>Analiz</h4><p>${safe.replace(/\n/g,'<br>')}</p></div>`;
  return sections.map(sec=>{
    const m=sec.match(/^(\d\))\s*([^\n]+)\n?([\s\S]*)$/);
    const title=m?m[2]:sec.split('\n')[0];
    const body=(m?m[3]:sec.split('\n').slice(1).join('\n')).trim();
    const cls=/Risk/i.test(title)?'ai-sec neg':/Öner|Aksiyon/i.test(title)?'ai-sec pos':'ai-sec';
    const items=body.split(/\n+/).filter(Boolean);
    if(items.length>1) return `<div class="${cls}"><h4>${title}</h4><ul>${items.map(i=>`<li>${i.replace(/^[-*•]\s*/,'')}</li>`).join('')}</ul></div>`;
    return `<div class="${cls}"><h4>${title}</h4><p>${body.replace(/\n/g,'<br>')}</p></div>`;
  }).join('');
}

// CALENDAR + DAY VIEW
// ══════════════════════════════════════════════════════════════
function renderDashCalendar(monthKey){
  const grid=document.getElementById('dash-cal-grid');
  const monthLbl=document.getElementById('dash-cal-month');
  if(!grid) return;

  const [y,mo]=monthKey.split('-').map(Number);
  const first=new Date(y,mo-1,1);
  const last=new Date(y,mo,0);
  const daysInMonth=last.getDate();
  // Monday-start offset (0 = Mon)
  const startOffset=(first.getDay()+6)%7;
  const prevLast=new Date(y,mo-1,0).getDate();

  // Aggregate amounts per day
  const incMap={}, expMap={};
  S.incomes.filter(i=>i.d.slice(0,7)===monthKey).forEach(i=>{ incMap[i.d]=(incMap[i.d]||0)+i.amt; });
  S.expenses.filter(e=>e.d.slice(0,7)===monthKey).forEach(e=>{ expMap[e.d]=(expMap[e.d]||0)+e.amt; });

  const todayIso=new Date().toISOString().slice(0,10);
  const selIso=S.dashDay||'';

  // Month header (Turkish)
  const monthNamesTR=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  if(monthLbl) monthLbl.textContent=monthNamesTR[mo-1]+' '+y;

  let html='';
  // Previous month tail
  for(let i=startOffset;i>0;i--){
    html+=`<div class="cal-day other"><span class="num">${prevLast-i+1}</span><span class="dots"></span></div>`;
  }
  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasIn=incMap[iso]>0;
    const hasOut=expMap[iso]>0;
    const cls=['cal-day'];
    if(iso===todayIso) cls.push('today');
    if(iso===selIso) cls.push('sel');
    const dots=(hasIn?'<span class="dot d-in"></span>':'')+(hasOut?'<span class="dot d-out"></span>':'');
    html+=`<div class="${cls.join(' ')}" onclick="selectDay('${iso}')"><span class="num">${d}</span><span class="dots">${dots}</span></div>`;
  }
  // Next month head (fill to 6 rows = 42 cells)
  const totalCells=startOffset+daysInMonth;
  const trailing=(totalCells%7===0)?0:(7-(totalCells%7));
  for(let i=1;i<=trailing;i++){
    html+=`<div class="cal-day other"><span class="num">${i}</span><span class="dots"></span></div>`;
  }
  grid.innerHTML=html;
}

function selectDay(iso){
  const wasSame = S.dashDay===iso;
  S.dashDay = wasSame ? '' : iso;
  renderDash();
  // Aynı güne tekrar dokunulduysa toggle kapatma — scroll etme
  if(!wasSame){
    setTimeout(()=>{
      const el=document.querySelector('.day-detail-card');
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    },50);
  }
}

function renderDayList(){
  const list=document.getElementById('day-list');
  if(!list) return;
  const iso=S.dashDay;
  if(!iso){
    list.innerHTML=`<div class="day-empty">Takvimde bir güne dokunun; o günün gelir ve giderleri burada görünsün.</div>`;
    return;
  }
  const inc=S.incomes.filter(i=>i.d===iso);
  const exp=S.expenses.filter(e=>e.d===iso);
  const rows=[
    ...inc.map(i=>({...i,_k:'in'})),
    ...exp.map(e=>({...e,_k:'out'}))
  ].sort((a,b)=>String(b.id||'').localeCompare(String(a.id||'')));

  const [y,mo,d]=iso.split('-');
  const mNames=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const sumIn=inc.reduce((a,i)=>a+(+i.amt||0),0);
  const sumOut=exp.reduce((a,e)=>a+(+e.amt||0),0);
  const summary=[];
  if(inc.length) summary.push(`${inc.length} gelir (+${fmt(sumIn)} ₺)`);
  if(exp.length) summary.push(`${exp.length} gider (−${fmt(sumOut)} ₺)`);
  if(!summary.length) summary.push('kayıt yok');
  const head=`
    <div class="day-list-head">
      <span class="day-list-title">${parseInt(d)} ${mNames[parseInt(mo)-1]}</span>
      <span class="day-list-meta">${summary.join(' · ')}</span>
    </div>`;

  if(!rows.length){
    list.innerHTML=head+`<div class="day-empty">Bu gün için kayıt yok.</div>`;
    return;
  }

  const body=rows.map(r=>{
    const isIn=r._k==='in';
    const meta=catMeta(r.cat);
    const label=meta.label||r.cat;
    const delFn=isIn?`delInc('${r.id}')`:`delExp('${r.id}')`;
    return `<div class="day-row list-row">
      ${monoChip(r.cat,'sm')}
      <div class="day-row-body">
        <div class="day-row-desc">${String(r.desc||label).replace(/</g,'&lt;')}</div>
        <div class="day-row-cat">${label}${r.bank?' · '+r.bank:''}</div>
      </div>
      <div class="day-row-right">
        <div class="day-row-amt ${isIn?'in':'out'}">${isIn?'+':'−'}${fmt(r.amt)} ₺</div>
        <button class="fav-ic fav-ic-del" title="Sil" onclick="${delFn}">×</button>
      </div>
    </div>`;
  }).join('');

  list.innerHTML=head+body;
}

function navDashMonth(delta){
  const cur=S.dashM!==null?S.dashM:CUR_IDX;
  const next=cur+delta;
  if(next<0||next>=MN.length) return;
  S.dashM=next;
  S.dashDay='';
  renderDash();
}

  S.favs=S.favs.filter(x=>x.id!==id);
  save();
  if(fromModal) closeFavForm();
  buildFavList();
  toast('Silindi');
}

// KATEGORİ CRUD (sadece custom kategoriler; default'lar kilitli)

const CAT_EMOJIS=['📌','🏷️','🎯','💼','🧾','🛍️','🏦','🎁','🧘','🚗','🐾','🌿','🍿','💊','🧰','☕','💧','🔧','📷','🎮'];
const CAT_COLORS=['#6B63E8','#3EC98A','#E8A83E','#8B6EE8','#4CAF68','#E8603E','#3EC9C4','#E86E8B','#5B8DE8','#9B9B9B','#E05656','#8BC449','#E84848','#5b8aa6','#a85b7d'];
function slugifyId(s){
  return 'c_'+String(s||'').toLocaleLowerCase('tr-TR')
    .replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,20) || ('cat_'+Date.now().toString(36).slice(-4));
}
function isDefaultCat(id){ return CATS.some(c=>c.id===id); }
function renderCatManager(){
  const el=document.getElementById('cat-manager');
  if(!el) return;
  const defaultHtml=CATS.map(c=>`
    <div class="cat-row locked">
      <div class="cat-row-main">${monoChip(c.id,'sm')}<span class="cat-row-label">${c.icon||''} ${c.label}</span></div>
      <span class="cat-row-lock" title="Varsayılan kategori">🔒</span>
    </div>`).join('');
  const customHtml=(S.customCats||[]).map(c=>`
    <div class="cat-row">
      <div class="cat-row-main">${monoChip(c.id,'sm')}<span class="cat-row-label">${escAttr(c.icon||'•')} ${escAttr(c.label)}</span></div>
      <div class="fav-actions">
        <button class="fav-ic" title="Düzenle" onclick="openCatForm('${escAttr(c.id)}')">✎</button>
        <button class="fav-ic fav-ic-del" title="Sil" onclick="delCat('${escAttr(c.id)}')">×</button>
      </div>
    </div>`).join('');
  el.innerHTML = `<div class="cat-section-title">Sizin kategorileriniz</div>${customHtml||'<div class="fav-empty">Henüz özel kategori yok. <button type="button" class="linky" onclick="openCatForm()">+ Yeni ekle</button></div>'}<div class="cat-section-title">Varsayılanlar</div>${defaultHtml}`;
}
function openCatForm(id){
  const editing=id?(S.customCats||[]).find(x=>x.id===id):null;
  const cur=editing?{...editing}:{id:'',label:'',icon:CAT_EMOJIS[0],color:CAT_COLORS[0]};
  const emojiRow=CAT_EMOJIS.map(e=>`<button type="button" class="emoji-pick ${cur.icon===e?'on':''}" onclick="pickCatEmoji('${e}')">${e}</button>`).join('');
  const colorRow=CAT_COLORS.map(c=>`<button type="button" class="color-pick ${cur.color===c?'on':''}" style="background:${c}" onclick="pickCatColor('${c}')" aria-label="${c}"></button>`).join('');

        <div class="qfield"><label>Emoji</label><div class="emoji-row">${emojiRow}</div></div>
        <div class="qfield"><label>Renk</label><div class="color-row">${colorRow}</div></div>
        <div class="fav-modal-actions">
          ${editing?`<button class="btn btn-danger" onclick="delCat('${escAttr(cur.id)}',true)">Sil</button>`:''}
          <button class="btn btn-secondary" onclick="closeCatForm()">Vazgeç</button>
          <button class="btn btn-primary" onclick="saveCatForm()">${editing?'Güncelle':'Ekle'}</button>
        </div>
      </div>
    </div>`;

function pickCatEmoji(e){ const i=document.getElementById('cf-icon'); if(i) i.value=e; document.querySelectorAll('.emoji-pick').forEach(b=>b.classList.toggle('on',b.textContent===e)); }
function pickCatColor(c){ const i=document.getElementById('cf-color'); if(i) i.value=c; document.querySelectorAll('.color-pick').forEach(b=>b.classList.toggle('on',b.getAttribute('aria-label')===c)); }
function closeCatForm(){ const m=document.getElementById('cat-modal'); if(m) m.remove(); }
function saveCatForm(){
  const id=(document.getElementById('cf-id').value||'').trim();
  const label=(document.getElementById('cf-label').value||'').trim();
  const icon=(document.getElementById('cf-icon').value||'📌').trim();
  const color=(document.getElementById('cf-color').value||'#888').trim();
  if(!label){toast('Ad girin',true);return;}
  if(id){
    const idx=(S.customCats||[]).findIndex(x=>x.id===id);
    if(idx>=0){ S.customCats[idx]={...S.customCats[idx],label,icon,color}; toast('✓ Kategori güncellendi'); }
  }else{
    let newId=slugifyId(label);
    let n=1; while(getCats().some(c=>c.id===newId)){ newId=slugifyId(label)+'_'+(++n); }
    S.customCats=S.customCats||[];
    S.customCats.push({id:newId,label,icon,color});
    toast('✓ Kategori eklendi');
  }
  save(); closeCatForm(); renderBudget(); buildCatGrid&&buildCatGrid();
}
function delCat(id,fromModal){
  if(isDefaultCat(id)){ toast('Varsayılan kategori silinemez',true); return; }
  const c=(S.customCats||[]).find(x=>x.id===id);
  if(!c) return;
  const linked=S.expenses.filter(e=>e.cat===id).length;
  const msg=linked>0
    ? `"${c.label}" kategorisi silinecek. ${linked} kayıt "Diğer" kategorisine taşınacak. Devam?`
    : `"${c.label}" kategorisini silmek istiyor musunuz?`;
  if(!confirm(msg)) return;
  if(linked>0){
    S.userExp=S.userExp.map(e=>e.cat===id?{...e,cat:'diger'}:e);
    S.expenses=S.expenses.map(e=>e.cat===id?{...e,cat:'diger'}:e);
  }
  S.customCats=(S.customCats||[]).filter(x=>x.id!==id);
  if(S.budgets[id]) delete S.budgets[id];
  save();
  if(fromModal) closeCatForm();
  renderBudget(); renderTxn&&renderTxn(); renderDash&&renderDash();
  toast(linked>0?`Silindi · ${linked} kayıt Diğer'e taşındı`:'Silindi');
}

function normalizeDesc(d){
  return String(d||'').toLocaleLowerCase('tr-TR')
    .replace(/[0-9]+/g,' ')
    .replace(/[^a-zçğıöşü ]+/g,' ')
    .replace(/\s+/g,' ').trim();
}
function detectSubscriptions(){
  // Son 3 ayda tekrarlanan (benzer isim + benzer tutar) harcamaları abonelik adayı olarak işaretle
  const since=new Date(); since.setMonth(since.getMonth()-3);
  const sinceStr=since.toISOString().slice(0,10);
  const groups={};
  S.expenses.filter(e=>e.d>=sinceStr).forEach(e=>{
    const key=normalizeDesc(e.desc).slice(0,24);
    if(!key) return;
    (groups[key]=groups[key]||[]).push(e);
  });
  const added=[];
  Object.keys(groups).forEach(key=>{
    const rows=groups[key];
    const months=new Set(rows.map(r=>(r.d||'').slice(0,7)));
    if(months.size<2) return; // en az 2 farklı ayda görünmeli
    const amts=rows.map(r=>+r.amt||0);
    const avg=amts.reduce((a,b)=>a+b,0)/amts.length;
    const maxDev=Math.max(...amts.map(a=>Math.abs(a-avg)/Math.max(1,avg)));
    if(maxDev>0.25) return; // %25'ten fazla sapma → abonelik değil
    // Daha önce eklenmiş mi?
    const exists=(S.subs||[]).some(s=>normalizeDesc(s.name).slice(0,24)===key);
    if(exists) return;
    const sample=rows[rows.length-1];
    const day=+((sample.d||'').slice(8))||1;
    S.subs=S.subs||[];
    S.subs.push({
      id:genId(),
      name:sample.desc,
      amt:Math.round(avg),
      cat:sample.cat||'dijital',
      bank:sample.bank||'Enpara',
      dayOfMonth:day,
      active:true,
      source:'auto',
      pending:true,
      firstSeen:rows[0].d,
      lastSeen:sample.d
    });
    added.push(sample.desc);
  });
  if(added.length){
    save();
    toast(`${added.length} abonelik adayı bulundu`);
  }
  return added.length;
}

// PARSE STATEMENT
// ══════════════════════════════════════════════════════════════
async function parseStmt(){
  const text=document.getElementById('stmt-text').value.trim(),bank=document.getElementById('stmt-bank').value;
  if(!text){toast('Metin boş',true);return;}
  const btn=document.getElementById('parse-btn');
  const resultEl=document.getElementById('parse-res');
  btn.disabled=true;btn.textContent='Gemini analiz ediyor…';
  resultEl.textContent='Gemini ile analiz ediliyor…';
  try{
    const data=await callGemini({
      systemInstruction:`Türk banka ekstresi parse et. Yalnızca geçerli JSON döndür. Her kayıt {d, desc, amt, cat, bank} alanlarını içersin. Tarih YYYY-MM-DD olsun. Yalnızca gerçek gider işlemlerini döndür. İade, iptal, alacak, pozitif geri ödeme ve bakiye satırlarını atla. Kategori seçerken bu kodlardan birini kullan: ${getCats().map(c=>c.id).join(', ')}. Banka alanı daima ${bank} olsun.`,
      userText:text.slice(0,12000),
      responseMimeType:'application/json',
      responseSchema:statementSchema(bank),
      maxOutputTokens:4096
    });
    const raw=geminiText(data)||'[]';
    const parsed=JSON.parse(raw);
    if(Array.isArray(parsed)&&parsed.length){
      const rows=parsed.map(t=>({
        id:genId(),
        d:String(t.d||'').slice(0,10),
        desc:(t.desc||'').trim()||bank+' ekstresi',
        amt:Math.abs(Number(t.amt)||0),
        cat:getCats().some(c=>c.id===t.cat)?t.cat:'diger',
        bank
      }));
      const added=importStatementRows(rows);
      save();
      const todayStr=new Date().toLocaleDateString('tr-TR');
      resultEl.textContent=`✓ Gemini ile ${added} kalem ${todayStr} tarihine kaydedildi.\nTakvimde tek kırmızı nokta · bütçe kategorileri güncellendi.\n\n`+rows.map(t=>`  ${t.desc}: ${fmt(t.amt)} ₺`).join('\n');
      document.getElementById('stmt-text').value='';
      toast(`✓ ${added} kalem eklendi`);
      renderDash();
      renderTxn&&renderTxn();
      detectSubscriptions();
      maybeOfferPostImportAnalysis(added);
    } else {
      const fallbackRows=parseStatementFallback(text,bank);
      const added=importStatementRows(fallbackRows);
      if(added){
        save();
        const todayStr=new Date().toLocaleDateString('tr-TR');
        resultEl.textContent=`✓ Yerel parser ile ${added} kalem ${todayStr} tarihine kaydedildi.\nTakvimde tek kırmızı nokta · bütçe kategorileri güncellendi.\n\n`+fallbackRows.map(t=>`  ${t.desc}: ${fmt(t.amt)} ₺`).join('\n');
        document.getElementById('stmt-text').value='';
        toast(`✓ ${added} kalem eklendi`);
        renderDash();
        renderTxn&&renderTxn();
        detectSubscriptions();
        maybeOfferPostImportAnalysis(added);
      } else {
        resultEl.textContent='İşlem bulunamadı.';
      }
    }
  }catch(e){
    const fallbackRows=parseStatementFallback(text,bank);
    const added=importStatementRows(fallbackRows);
    if(added){
      save();
      const todayStr=new Date().toLocaleDateString('tr-TR');
      resultEl.textContent=`⚠ Gemini hatası: ${friendlyGeminiError(e)}\n\nYerel parser ile ${added} kalem ${todayStr} tarihine kaydedildi.\n\n`+fallbackRows.map(t=>`  ${t.desc}: ${fmt(t.amt)} ₺`).join('\n');
      document.getElementById('stmt-text').value='';
      toast(`✓ Fallback ile ${added} kalem eklendi`);
      renderDash();
      renderTxn&&renderTxn();
      detectSubscriptions();
      maybeOfferPostImportAnalysis(added);
    } else {
      resultEl.textContent='Hata: '+friendlyGeminiError(e);
      toast('Hata',true);
    }
  }
  btn.disabled=false;btn.textContent='İçe Aktar';
}

function maybeOfferPostImportAnalysis(addedCount){
  const key=getGeminiKey();
  if(!key) return; // key yoksa önerme
  if(!addedCount) return;
  setTimeout(()=>{
    if(confirm(`${addedCount} kalem eklendi.\n\nBu ekstrenin AI analizini de yapalım mı?`)){
      go('more',document.getElementById('nb-more'));
      setTimeout(()=>{
        const btn=document.getElementById('analyze-all-btn');
        if(btn){ btn.scrollIntoView({behavior:'smooth',block:'center'}); setTimeout(()=>analyzeAllSpending(),400); }
      },300);
    }
  },600);
}

async function analyzeAllSpending(){
  const btn=document.getElementById('analyze-all-btn');
  const out=document.getElementById('analysis-res');
  if(!getGeminiKey()){
    out.innerHTML=`<div class="ai-sec neg"><h4>API key gerekli</h4><p>Analiz için Gemini API key eklemelisiniz. Yukarıdaki "Gemini API Key" alanına yapıştırın ve "Bağlantıyı Test Et" ile doğrulayın.</p></div>`;
    toast('API key gerekli',true);
    return;
  }
  btn.disabled=true;
  btn.textContent='Gemini analiz ediyor…';
  out.textContent='Tüm giderler ve gelirler analiz ediliyor…';
  try{
    const data=await callGemini({
      systemInstruction:'Sen kişisel finans analistisin. Kullanıcının son 6 aylık gider, gelir ve bütçe verisini incele. Türkçe yaz. Cevabı kısa ama somut tut. Şu başlıkları kullan: 1) Genel Durum 2) En Fazla Para Yakan Kalemler 3) Riskler 4) Gelecek Ay İçin 3 Net Öneri. Mümkün olduğunda rakam ver.',
      userText:buildSpendingAnalysisInput(),
      responseMimeType:'text/plain',
      maxOutputTokens:1800
    });
    out.innerHTML=renderAnalysisHtml(geminiText(data)||'');
  }catch(e){
    out.innerHTML=`<div class="ai-sec neg"><h4>Hata</h4><p>${friendlyGeminiError(e)}</p></div>`;
    toast('Hata',true);
  }
  btn.disabled=false;
  btn.textContent='Analiz Et';
}

// DATA

function resetAll(){
  if(!confirm('Tüm giderler, gelirler ve bütçeler silinecek. Önce otomatik yedek indirilecek. Devam?'))return;
  // Güvenlik: önce otomatik yedek indir
  try{
    const backup={exportedAt:new Date().toISOString(),note:'resetAll öncesi otomatik yedek',expenses:S.userExp,incomes:S.incomes,budgets:S.budgets};
    const b=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ay_backup_reset_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();
  }catch(e){console.warn('reset backup failed',e);}
  S.userExp=[];S.expenses=[];S.incomes=[];S.budgets={...DEF_BUD};
  S.customCats=[];S.subs=[];
  save();toast('✓ Veriler sıfırlandı · yedek indirildi');
  renderDash();renderTxn&&renderTxn();renderIncome&&renderIncome();renderBudget&&renderBudget();
}
function exportData(){
  const payload={
    expenses:S.userExp,
    incomes:S.incomes,
    budgets:S.budgets,
    favs:S.favs,
    customCats:S.customCats||[],
    subs:S.subs||[]
  };
  const b=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='butce_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('✓ Yedek alındı');
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{
    const d=JSON.parse(ev.target.result);
    if(d.expenses){S.userExp=d.expenses;S.expenses=[...S.userExp];}
    if(d.incomes)S.incomes=d.incomes;
    if(d.budgets)S.budgets={...DEF_BUD,...d.budgets};
    if(Array.isArray(d.favs)) S.favs=d.favs.map(f=>({...f,id:f.id||genId()}));
    if(Array.isArray(d.customCats)) S.customCats=d.customCats.filter(c=>c&&c.id&&c.label);
    if(Array.isArray(d.subs)) S.subs=d.subs.map(s=>({...s,id:s.id||genId()}));
    save();toast('✓ Veri yüklendi');go('dash',document.getElementById('nb-dash'));
  }catch{toast('Hata: geçersiz dosya',true);}};
  r.readAsText(f);
}

function setMoreTab(tab,btn){
  document.querySelectorAll('.more-panel').forEach(p=>p.style.display='block');
  renderFixed();
  const target=document.getElementById('more-'+(tab||'ekstre'));
  if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
}

// ══════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════
function go(screen,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
  if(screen==='budget-shortcut'){
    const sb=document.getElementById('s-budget');
    if(sb) sb.classList.add('on');
    if(btn) btn.classList.add('on');
    renderBudget();
    scrollToTopInstant();
    return;
  }
  const target=document.getElementById('s-'+screen);
  if(target) target.classList.add('on');
  if(btn) btn.classList.add('on');
  if(screen==='dash'){
    renderDash();
  }
  else if(screen==='quick'){
    buildCatGrid();buildFavList();renderTxn();
    const d=document.getElementById('q-date');if(d&&!d.value)d.value=new Date().toISOString().slice(0,10);
    const qd=document.getElementById('quick-date-display');
    if(qd) qd.textContent=new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'});
  }
  else if(screen==='income'){
    renderIncome();
  }
  else if(screen==='more'){
    setMoreTab('ekstre',null);
  }
  scrollToTopInstant();
}

function scrollToTopInstant(){
  // Anlık kaydırma — smooth iOS Safari'de yer yer atlanabiliyor, kesin davranış için instant
  try{ window.scrollTo(0,0); }catch(_){}
  try{ document.documentElement.scrollTop=0; }catch(_){}
  try{ document.body.scrollTop=0; }catch(_){}
  // Aktif ekranın kendi scroll'u varsa onu da sıfırla
  const active=document.querySelector('.screen.on');
  if(active) active.scrollTop=0;
}
